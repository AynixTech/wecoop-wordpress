<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="vibrant.css">
  <title>{{full_name}} - CV</title>
</head>
<body class="vibrant">
  <div class="sheet">
    <aside class="left">
      <div class="photo-wrap">
        <img class="photo" src="{{photo_url}}" alt="profile">
      </div>
      <h1>{{full_name}}</h1>
      <p class="role">{{job_title}}</p>

      <section>
        <h2>{{label_contact}}</h2>
        <p>{{email}}</p>
        <p>{{phone}}</p>
        <p>{{address}}</p>
      </section>

      <section>
        <h2>{{label_skills}}</h2>
        <div>{{skills_list}}</div>
      </section>

      <section>
        <h2>{{label_languages}}</h2>
        <div>{{languages_list}}</div>
      </section>
    </aside>

    <main class="right">
      <section>
        <h2>{{label_profile}}</h2>
        <p>{{profile_summary}}</p>
      </section>

      <section>
        <h2>{{label_experience}}</h2>
        <div>{{experience_list}}</div>
      </section>

      <section>
        <h2>{{label_education}}</h2>
        <div>{{education_list}}</div>
      </section>
    </main>
  </div>
</body>
</html>
